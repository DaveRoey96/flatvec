name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install with dev dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'

    - name: Run tests
      run: pytest -v

  benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install
      run: |
        python -m pip install --upgrade pip
        pip install -e '.[dev]'

    - name: Run benchmark
      run: |
        python -m flatvec.benchmark --count 100000 --dim 128 --queries 100 --top-k 10
        python -m flatvec.benchmark --count 50000 --dim 128 --queries 100 --top-k 10
        python -m flatvec.benchmark --count 20000 --dim 128 --queries 100 --top-k 10
